<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Estructuras de datos y ciclos: Visualización 3D</title>
    <style>
        body { margin: 0; display: flex; height: 100vh; overflow: hidden; font-family: sans-serif; }

        /* Mitad izquierda: toolbar + editor */
        #left-panel {
            width: 40%;
            height: 100%;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #444;
            background: #282c34;
        }
        #toolbar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: #21252b;
            border-bottom: 1px solid #444;
            flex-shrink: 0;
        }
        #toolbar button {
            padding: 5px 14px;
            font-size: 13px;
            cursor: pointer;
            border-radius: 5px;
            border: 1px solid #555;
            background: #3a3f4b;
            color: #abb2bf;
            transition: background 0.15s;
        }
        #toolbar button:hover { background: #4a5060; }
        #line-indicator {
            color: #7c828d;
            font-size: 12px;
            font-family: monospace;
            margin-left: auto;
        }
        #editor-container { flex: 1; overflow: hidden; }

        /* Mitad derecha: canvas */
        #canvas-container { width: 60%; height: 100%; background: #282c34 }

        /* CodeMirror ocupa todo el contenedor */
        .cm-editor { height: 100%; }
        .cm-scroller { overflow: auto; }
    </style>
</head>
<body>
	
	 <div id="left-panel">
        <div id="toolbar">
            <button id="btn-next">Siguiente </button>
			<button id="btn-reset">Reiniciar </button>
			<a href="../Index.html">
			<button id="btn-return">Regresar </button>
			</a>
			<span id="line-indicator">Línea: 0</span>
        </div>
        <div id="editor-container"></div>
    </div>

    <div id="canvas-container"></div>

    <script src="main_multiplicarT.js"></script>
</body>
</html>
